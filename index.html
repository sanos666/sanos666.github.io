<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🏒 STATS AND BEER 🍺</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="sab_mini_logo.png" />
    <link href="OMH-stats-ui.styles.css" rel="stylesheet" />
    <link href="_content/MatBlazor/dist/matBlazor.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MatBlazor/dist/matBlazor.js"></script>
    <script src="scripts/html2canvas.js"></script>
    <script src="scripts/screenshot.js"></script>
    <script>
        // Restore path after GitHub Pages 404 redirect
        (function () {
            var redirect = sessionStorage.getItem('redirectPath');
            if (redirect) {
                sessionStorage.removeItem('redirectPath');
                window.history.replaceState(null, '', redirect);
            }
        })();
    </script>
</body>

</html>
